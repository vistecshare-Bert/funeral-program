<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <mask id="oval-floral-mask">
      <rect width="400" height="500" fill="white"/>
      <ellipse cx="200" cy="250" rx="162" ry="205" fill="black"/>
    </mask>
  </defs>
  <!-- Oval gold border -->
  <ellipse cx="200" cy="250" rx="162" ry="205" fill="none" stroke="#c8a96e" stroke-width="7"/>
  <ellipse cx="200" cy="250" rx="155" ry="198" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <!-- Corner floral accents — simplified decorative leaves -->
  <!-- Top -->
  <g transform="translate(200,30)" fill="#c8a96e">
    <ellipse cx="0" cy="0" rx="18" ry="8" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="18" ry="8" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="5"/>
    <ellipse cx="-22" cy="6" rx="12" ry="5" transform="rotate(-20)"/>
    <ellipse cx="22" cy="6" rx="12" ry="5" transform="rotate(20)"/>
  </g>
  <!-- Bottom -->
  <g transform="translate(200,470)" fill="#c8a96e">
    <ellipse cx="0" cy="0" rx="18" ry="8" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="18" ry="8" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="5"/>
    <ellipse cx="-22" cy="-6" rx="12" ry="5" transform="rotate(20)"/>
    <ellipse cx="22" cy="-6" rx="12" ry="5" transform="rotate(-20)"/>
  </g>
  <!-- Left -->
  <g transform="translate(25,250)" fill="#c8a96e">
    <ellipse cx="0" cy="0" rx="8" ry="16" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="8" ry="16" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="4"/>
  </g>
  <!-- Right -->
  <g transform="translate(375,250)" fill="#c8a96e">
    <ellipse cx="0" cy="0" rx="8" ry="16" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="8" ry="16" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="4"/>
  </g>
</svg>
