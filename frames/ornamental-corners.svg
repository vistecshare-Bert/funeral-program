<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="orn-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#e8c97e"/>
      <stop offset="100%" stop-color="#a0823d"/>
    </linearGradient>
  </defs>
  <!-- Top-left corner ornament -->
  <g transform="translate(12,12)" fill="url(#orn-gold)">
    <rect x="0" y="0" width="60" height="4" rx="2"/>
    <rect x="0" y="0" width="4" height="60" rx="2"/>
    <circle cx="0" cy="0" r="7"/>
    <ellipse cx="35" cy="0" rx="14" ry="6" transform="rotate(-10)"/>
    <ellipse cx="0" cy="35" rx="6" ry="14" transform="rotate(-10)"/>
    <circle cx="18" cy="18" r="4"/>
  </g>
  <!-- Top-right corner ornament -->
  <g transform="translate(388,12) scale(-1,1)" fill="url(#orn-gold)">
    <rect x="0" y="0" width="60" height="4" rx="2"/>
    <rect x="0" y="0" width="4" height="60" rx="2"/>
    <circle cx="0" cy="0" r="7"/>
    <ellipse cx="35" cy="0" rx="14" ry="6" transform="rotate(-10)"/>
    <ellipse cx="0" cy="35" rx="6" ry="14" transform="rotate(-10)"/>
    <circle cx="18" cy="18" r="4"/>
  </g>
  <!-- Bottom-left corner ornament -->
  <g transform="translate(12,488) scale(1,-1)" fill="url(#orn-gold)">
    <rect x="0" y="0" width="60" height="4" rx="2"/>
    <rect x="0" y="0" width="4" height="60" rx="2"/>
    <circle cx="0" cy="0" r="7"/>
    <ellipse cx="35" cy="0" rx="14" ry="6" transform="rotate(-10)"/>
    <ellipse cx="0" cy="35" rx="6" ry="14" transform="rotate(-10)"/>
    <circle cx="18" cy="18" r="4"/>
  </g>
  <!-- Bottom-right corner ornament -->
  <g transform="translate(388,488) scale(-1,-1)" fill="url(#orn-gold)">
    <rect x="0" y="0" width="60" height="4" rx="2"/>
    <rect x="0" y="0" width="4" height="60" rx="2"/>
    <circle cx="0" cy="0" r="7"/>
    <ellipse cx="35" cy="0" rx="14" ry="6" transform="rotate(-10)"/>
    <ellipse cx="0" cy="35" rx="6" ry="14" transform="rotate(-10)"/>
    <circle cx="18" cy="18" r="4"/>
  </g>
  <!-- Center top thin accent line -->
  <line x1="90" y1="14" x2="310" y2="14" stroke="url(#orn-gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- Center bottom thin accent line -->
  <line x1="90" y1="486" x2="310" y2="486" stroke="url(#orn-gold)" stroke-width="1.5" opacity="0.5"/>
</svg>
