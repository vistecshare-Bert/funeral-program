<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <mask id="rect-round-mask">
      <rect width="400" height="500" fill="white"/>
      <rect x="18" y="18" width="364" height="464" rx="22" ry="22" fill="black"/>
    </mask>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c97e"/>
      <stop offset="50%"  stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#a0823d"/>
    </linearGradient>
  </defs>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="484" rx="28" ry="28" fill="none" stroke="url(#gold-grad)" stroke-width="5"/>
  <!-- Inner border -->
  <rect x="18" y="18" width="364" height="464" rx="22" ry="22" fill="none" stroke="url(#gold-grad)" stroke-width="3"/>
  <!-- Thin inner line -->
  <rect x="26" y="26" width="348" height="448" rx="16" ry="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Corner ornaments -->
  <g fill="url(#gold-grad)">
    <circle cx="30" cy="30" r="5"/>
    <circle cx="370" cy="30" r="5"/>
    <circle cx="30" cy="470" r="5"/>
    <circle cx="370" cy="470" r="5"/>
  </g>
</svg>
